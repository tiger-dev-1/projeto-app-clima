<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de Clima</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Consulta de Clima</h1>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Digite o nome da cidade...">
            <button id="searchBtn">Buscar</button>
        </div>
        <div id="weatherResult">
            <!-- Os dados serão inseridos aqui via JavaScript -->
        </div>
    </div>

    <!-- O atributo type="module" é o que permite usar import/export no main.js -->
    <script type="module" src="js/main.js"></script>
    <!-- Script de testes (remover antes da entrega final se o curso não pedir) -->
    <script type="module" src="js/tests.js"></script>
</body>
</html>
