<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de Clima</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Consulta de Clima</h1>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Digite o nome da cidade...">
            <button id="searchBtn">Buscar</button>
        </div>
        <div id="weatherResult">
            <!-- Os dados serão inseridos aqui via JavaScript -->
        </div>
        <footer style="margin-top: 20px; font-size: 0.8rem; opacity: 0.7;">
            Dados meteorológicos por <a href="https://open-meteo.com/" target="_blank" rel="noopener" style="color: inherit; text-decoration: underline;">Open-Meteo.com</a>
        </footer>
    </div>

    <!-- O atributo type="module" é o que permite usar import/export no main.js -->
    <script type="module" src="js/main.js"></script>
    <!-- Script de testes: Para ativar, remova o comentário abaixo -->
    <!-- <script type="module" src="js/tests.js"></script> -->
</body>
</html>
